<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KarabiberOto Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="site-header">
            <a class="brand" href="#store" aria-label="KarabiberOto">
                <span class="brand-mark">KBO</span>
                <strong>KarabiberOto</strong>
            </a>

            <div class="search-field">
                <span>⌕</span>
                <input id="searchInput" type="search" placeholder="Ürün, marka veya kategori ara">
            </div>

            <nav class="nav-list" aria-label="Ana menü">
                <button class="nav-button is-active" data-view="store" type="button">
                    <span class="icon">⌂</span> Mağaza
                </button>
                <button class="nav-button" data-view="ai" type="button">
                    <span class="icon">✦</span> AI Renk
                </button>
                <button class="nav-button" data-view="profile" type="button">
                    <span class="icon">◎</span> Hesap
                </button>
                <button id="openFavorites" class="nav-button favorite-nav-button" type="button">
                    <span class="icon">♡</span> Favoriler
                    <strong id="favoriteCount">0</strong>
                </button>
            </nav>

            <button id="openCart" class="cart-button" type="button" aria-label="Sepeti aç">
                <span>Sepet</span>
                <strong id="cartCount">0</strong>
            </button>
        </header>

        <main class="main">
            <h1 id="viewTitle" class="view-heading">Mağaza</h1>

            <section id="storeView" class="view is-active" aria-labelledby="viewTitle">
                <div class="store-layout">
                    <aside class="filter-panel" aria-label="Filtreler">
                        <section class="filter-block">
                            <div class="filter-title">
                                <h2>Fiyat Aralığı</h2>
                                <button id="resetPriceFilter" type="button">Sıfırla</button>
                            </div>
                            <div class="range-visual">
                                <span style="height: 28%"></span>
                                <span style="height: 52%"></span>
                                <span style="height: 38%"></span>
                                <span style="height: 72%"></span>
                                <span style="height: 46%"></span>
                                <span style="height: 84%"></span>
                                <span style="height: 58%"></span>
                                <span style="height: 36%"></span>
                            </div>
                            <div class="range-line">
                                <strong>250 TL</strong>
                                <strong>7.500 TL</strong>
                            </div>
                            <div class="price-filter-fields">
                                <label>
                                    <span>Min</span>
                                    <input id="minPriceInput" type="number" min="0" inputmode="decimal" placeholder="0">
                                </label>
                                <label>
                                    <span>Max</span>
                                    <input id="maxPriceInput" type="number" min="0" inputmode="decimal" placeholder="99999">
                                </label>
                            </div>
                        </section>

                        <section class="filter-block">
                            <div class="filter-title">
                                <h2>Kategoriler</h2>
                                <button id="clearCategoryFilter" type="button">Tümü</button>
                            </div>
                            <div id="filterCategoryList" class="filter-category-list"></div>
                        </section>

                    </aside>

                    <section class="catalog-panel">
                        <div class="catalog-head">
                            <div>
                                <p class="eyebrow">KarabiberOto satış vitrini</p>
                                <h2>Öne çıkan ürünler</h2>
                            </div>
                            <button id="refreshCatalog" class="button secondary" type="button">Yenile</button>
                        </div>
                        <div id="catalogState" class="state-line"></div>
                        <div id="productsGrid" class="products-grid"></div>
                    </section>
                </div>
            </section>

            <section id="aiView" class="view" aria-labelledby="viewTitle">
                <div class="ai-layout">
                    <section class="work-panel">
                        <div class="image-drop">
                            <input id="vehicleImage" type="file" accept="image/*">
                            <img id="vehiclePreview" alt="">
                            <div id="emptyPreview" class="empty-preview">
                                <strong>Arac fotografi secin</strong>
                                <span>Renk onizleme sonucu burada gorunur.</span>
                            </div>
                            <div id="processingOverlay" class="processing-overlay">Isleniyor...</div>
                        </div>
                        <div class="preview-actions">
                            <button id="toggleOriginal" class="button secondary" type="button" disabled>Orijinal / Sonuc</button>
                            <button id="downloadPreview" class="button secondary" type="button" disabled>Indir</button>
                        </div>
                    </section>

                    <section class="controls-panel">
                        <h2>Renk secimi</h2>
                        <div id="colorPalette" class="color-palette"></div>
                        <label class="custom-color">
                            <span>Ozel renk</span>
                            <input id="customColor" type="color" value="#1193d4">
                        </label>
                        <button id="generatePreview" class="button primary" type="button" disabled>Onizleme Olustur</button>
                        <p id="aiState" class="state-line"></p>
                    </section>
                </div>
            </section>

            <section id="profileView" class="view" aria-labelledby="viewTitle">
                <div class="profile-grid">
                    <section id="authCard" class="auth-card"></section>
                    <section class="profile-card">
                        <h2>Oturum bilgisi</h2>
                        <dl>
                            <div>
                                <dt>Kullanici</dt>
                                <dd id="profileName">Misafir</dd>
                            </div>
                            <div>
                                <dt>E-posta</dt>
                                <dd id="profileEmail">Giris yapilmadi</dd>
                            </div>
                            <div>
                        </dl>
                    </section>
                </div>
            </section>
        </main>
    </div>

    <dialog id="productDialog" class="dialog"></dialog>
    <dialog id="favoritesDialog" class="dialog"></dialog>
    <dialog id="cartDialog" class="dialog cart-dialog"></dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
</body>
</html>
